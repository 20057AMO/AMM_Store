<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="Icon" href="design/logo.png">
    <title>AMM Store - Luxury Login</title>
</head>
<body class="login-page">
    <!-- Start Cart  -->
    <div class="cart" id="cart"></div>
    <!-- End Cart  -->
    
    <!-- start checkout popup  -->
    <div class="popup" id="checkout"></div>
    <!-- end checkout popup  -->

    <!-- Start nav bar section  -->
    <nav class="nav-bar" id="navBar">
    </nav>
    <!-- End nav bar section  -->

    <div class="login-card">
        <form action="index.html" id="login-form">
            <header class="login-header">
                <img src="design/logo.png" alt="AMM Logo">
                <h1>Login</h1>
                <p>Absolute Modern Mastery</p>
            </header>

            <div class="input-container">
                <i class="fa-solid fa-user"></i>
                <input type="text" name="name" placeholder="User Name / Email" autofocus required>
            </div>

            <div class="input-container">
                <i class="fa-solid fa-lock"></i>
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <div class="form-options">
                <label style="color: var(--text-muted); font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" style="accent-color: var(--gold-primary);"> Remember Me
                </label>
                <a href="#" class="forgot-link">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-luxury">Sign In</button>

            <div class="register-prompt">
                Don't have an account? <span id="toggle-register">Create One</span>
            </div>
        </form>
    </div> 

    <script src="js/main.js"></script>
    <script src="js/logic.js"></script>
    <script>
        // Simple toggle effect for demo
        document.getElementById('toggle-register').addEventListener('click', function() {
            const h1 = document.querySelector('.login-header h1');
            const btn = document.querySelector('.btn-luxury');
            const prompt = document.querySelector('.register-prompt');
            
            if (h1.innerText === "Login") {
                h1.innerText = "Register";
                btn.innerText = "Join AMM";
                prompt.innerHTML = 'Already a member? <span id="toggle-register">Login</span>';
            } else {
                h1.innerText = "Login";
                btn.innerText = "Sign In";
                prompt.innerHTML = "Don't have an account? <span id=\"toggle-register\">Create One</span>";
            }
            // Re-add listener if innerHTML was reset
            document.getElementById('toggle-register').addEventListener('click', arguments.callee);
        }, {once: true});
    </script>
</body>
</html>
