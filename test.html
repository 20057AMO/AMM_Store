<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    .toggle-btn {
    background: transparent;
    color: #d4af37; /* Gold color */
    border: 1px solid #d4af37;
    padding: 10px 25px;
    border-radius: 20px;
    cursor: pointer;
    transition: 0.3s;
}

.toggle-btn.active {
    background: #d4af37;
    color: #000; /* Black text when active */
}

.content-section {
    padding: 20px;
    color: black;

}
    </style>
</head>
<body>
<div class="toggle-container">
  <button class="toggle-btn" onclick="switchSeason(this, 'winter-section')">WINTER</button>
  <button class="toggle-btn active" onclick="switchSeason(this, 'summer-section')">SUMMER</button>
</div>

<div id="winter-section" class="content-section" style="display:none;">
  <!-- Winter content here -->
  <h2>Winter Collection</h2>
</div>

<div id="summer-section" class="content-section">
  <!-- Summer content here -->
  <h2>Summer Collection</h2>
</div>

<script>
    function switchSeason(clickedElement, sectionId) {
    // 1. Remove 'active' class from all buttons
    const buttons = document.querySelectorAll('.toggle-btn');
    buttons.forEach(btn => btn.classList.remove('active'));

    // 2. Add 'active' class to the clicked button
    clickedElement.classList.add('active');

    // 3. Hide all content sections
    const sections = document.querySelectorAll('.content-section');
    sections.forEach(section => section.style.display = 'none');

    // 4. Show the specific section linked to the button
    const targetSection = document.getElementById(sectionId);
    if (targetSection) {
        targetSection.style.display = 'block';
    }
}
</script>
</body>
</html>
