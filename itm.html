<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Add google font here  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap"

    <link rel="stylesheet" href="css/itm.css">

    <div class="cart" id="cart">
    </div>
    <!-- End Cart  -->

    <!-- end checkout popup  -->

    <section class="products">

            <a href="#winterSection" class="btn " id="winterBtn"><i class="fa-solid fa-snowflake"></i> Winter</a>
            <a href="#summerSection" class="btn " id="summerBtn"><i class="fa-solid fa-sun"></i> Summer</a>
        </div>
        <div class="container grid-system-3  " id="summerSection">

        </div>
        <div class="container grid-system-3" id="winterSection">
