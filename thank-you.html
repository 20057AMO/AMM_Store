<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/thank-you.css">
    <link rel="Icon" href="design/logo.png">
    <title>AMM Store - Thank You</title>
</head>

<body>
    <!-- Start Cart  -->
    <div class="cart" id="cart">
    </div>
    <!-- End Cart  -->

    <!-- start checkout popup  -->
    <div class="popup" id="checkout">
    </div>
    <!-- end checkout popup  -->

    <!-- Start nav bar section  -->
    <nav class="nav-bar" id="navBar">
    </nav>
    <!-- End nav bar section  -->

    <!-- Start Thank You Section -->
    <section class="thank-you-section">
        <div class="thank-you-container">
            <div class="icon-wrapper">
                <i class="fa-solid fa-check"></i>
            </div>
            <h1>Thank You</h1>
            <h2>Your order has been confirmed</h2>
            <p>Welcome to the world of excellence. An email with your order details will be sent shortly.</p>
            <div class="order-details-box">
                <p>Order Number: <strong>#AMM-<span></span></strong></p>
                <div class="div-line"></div>
                <p>Brand: <span class="gold-text">AMM</span>
                <p style="font-size: 12px;">(ABSOLUTE MODERN MASTERY)</p>
                </p>
            </div>
            <a href="index.html" class="home-btn">Return to Homepage</a>
        </div>
    </section>
    <!-- End Thank You Section -->

    <!--start footer-->
    <footer class="amm-footer">
        <div class="footer-container">
            <section class="social-contact-section">
                <div class="social-container">
                    <a href="#" class="social-item">
                        <div class="icon-circle">
                            <i class="fa-brands fa-tiktok"></i>
                        </div>
                    </a>
                    <a href="#" class="social-item">
                        <div class="icon-circle">
                            <i class="fa-brands fa-instagram"></i>
                        </div>
                    </a>
                    <a href="#" class="social-item">
                        <div class="icon-circle">
                            <i class="fa-brands fa-facebook-f"></i>
                        </div>
                    </a>
                </div>
            </section>
        </div>
        <div class="footer-bottom" style="text-align: center; color: var(--text-muted); padding-top: 20px;">
            <p>Designed By Web Builders Team &copy; 2026</p>
        </div>
    </footer>
    <!--end footer-->

    <script src="js/main.js"></script>
    <script src="js/logic.js"></script>
    <script>
        document.querySelector('.order-details-box strong span').innerText = Math.floor(100000 + Math.random() * 900000);
    </script>
</body>

</html>
